name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-13
    
    steps:
    - uses: actions/checkout@v3

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

    - name: Build
      run: |
        xcodebuild clean build -project Qlypx.xcodeproj -scheme Qlypx -destination 'platform=macOS' CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO